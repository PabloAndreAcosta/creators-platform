name: Daily storage backup

# Backs up the Supabase Storage buckets to a Cloudflare R2 bucket once a day.
# Supabase's managed DB backups do NOT include Storage objects (only metadata),
# so without this a deleted/overwritten file is unrecoverable.
#
# This project's Supabase dashboard does not expose dedicated S3 access keys, so
# scripts/backup-storage.mjs downloads every object via the Storage REST API
# (authenticated with the secret/service_role key) into a staging dir, then
# rclone syncs that dir to R2.
#
# Retention: R2's dashboard has no object versioning, so rclone --backup-dir
# MOVES any file that would be overwritten/deleted into _archive/<date>/<bucket>.
# An R2 Object Lifecycle Rule on prefix "_archive/" expires those after 30 days.
on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC daily, after the Supabase DB-backup window
  workflow_dispatch: {} # allow manual runs / first full sync

jobs:
  backup:
    # Only run in the production org repo, not the private mirror (matches the
    # guard in booking-soon-reminder.yml so we don't double-run / double-charge).
    if: github.repository == 'usha-ab/creators-platform'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download Supabase Storage objects -> staging/
        env:
          SUPABASE_URL: https://hiurrvorwqfihtdfhbhv.supabase.co
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          STAGING_DIR: staging
        run: node scripts/backup-storage.mjs

      - name: Install rclone
        run: curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Sync staging -> R2 (archiving replaced/deleted files)
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_REGION: auto
          RCLONE_CONFIG_R2_ENDPOINT: https://8565b50b1ae92c826fcd25ada1b15b14.r2.cloudflarestorage.com
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          DATE=$(date -u +%F)
          for b in avatars creator-media event-images listing-images; do
            echo "::group::Syncing $b"
            rclone sync "staging/$b" "R2:ushja-storage-backup/$b" \
              --backup-dir "R2:ushja-storage-backup/_archive/$DATE/$b" \
              --fast-list --transfers 8 -v
            echo "::endgroup::"
          done

      - name: Notify on failure
        if: failure()
        run: |
          curl -fsS -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "Usha Platform <noreply@usha.se>",
              "to": "pablo.acosta@usha.se",
              "subject": "⚠️ Daglig storage-backup misslyckades",
              "text": "Workflowen \"Daily storage backup\" failade. Kolla GitHub Actions-loggen: https://github.com/usha-ab/creators-platform/actions/workflows/storage-backup.yml"
            }'
