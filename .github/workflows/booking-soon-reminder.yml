name: Hourly cron jobs

# Hourly external triggers for jobs that need sub-daily frequency.
# Vercel Hobby caps crons at once/day, so this scheduler hits the endpoints
# instead. Endpoints are idempotent (dedup columns), so an occasional
# double-fire is harmless. GitHub cron is best-effort (may drift a few minutes).
on:
  schedule:
    - cron: "0 * * * *" # every hour, UTC
  workflow_dispatch: {} # allow manual runs

jobs:
  ping:
    # Only run in the production org repo, not the private mirror.
    if: github.repository == 'usha-ab/creators-platform'
    runs-on: ubuntu-latest
    steps:
      - name: Booking "starts soon" reminders (T-2h)
        run: |
          curl -fsS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://usha.se/api/cron/booking-reminders-soon
      - name: Notify followers of new creator events
        run: |
          curl -fsS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://usha.se/api/cron/creator-event-notify
      - name: Auto-publish upcoming events to Facebook (T-3d)
        run: |
          curl -fsS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://usha.se/api/cron/event-reminders
